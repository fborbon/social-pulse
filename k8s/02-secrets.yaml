# EDUCATIONAL NOTE ─────────────────────────────────────────────────────────────
# Secrets store sensitive values base64-encoded (NOT encrypted by default).
# In production use a Secret store like HashiCorp Vault, AWS Secrets Manager,
# or enable Kubernetes envelope encryption so secrets are encrypted at rest.
#
# Values below are base64 placeholders. Generate real ones with:
#   echo -n "your-value" | base64
#
# Never commit real secrets to git. Use Sealed Secrets or External Secrets
# Operator to manage them in a GitOps workflow.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: social-pulse-secrets
  namespace: social-pulse
type: Opaque
data:
  POSTGRES_USER:         cHVsc2U=          # pulse
  POSTGRES_PASSWORD:     cHVsc2U=          # pulse
  ANTHROPIC_API_KEY:     REPLACE_ME
  GUARDIAN_API_KEY:      REPLACE_ME
  NEWSAPI_KEY:           REPLACE_ME
  NYTIMES_API_KEY:       REPLACE_ME
  REDDIT_CLIENT_ID:      REPLACE_ME
  REDDIT_CLIENT_SECRET:  REPLACE_ME
  BLUESKY_HANDLE:        REPLACE_ME
  BLUESKY_APP_PASSWORD:  REPLACE_ME
