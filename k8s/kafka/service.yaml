apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: social-pulse
spec:
  selector: { app: zookeeper }
  ports:
    - port: 2181
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: social-pulse
spec:
  selector: { app: kafka }
  ports:
    - port: 9092
  clusterIP: None
