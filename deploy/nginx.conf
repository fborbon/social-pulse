# Nginx reverse proxy for Social Pulse at /social-pulse/
# Place in /etc/nginx/sites-available/forwardforecasting
# Enable: ln -s /etc/nginx/sites-available/forwardforecasting /etc/nginx/sites-enabled/
# Reload:  nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name www.forwardforecasting.eu forwardforecasting.eu;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.forwardforecasting.eu forwardforecasting.eu;

    # TLS — managed by certbot/Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/www.forwardforecasting.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.forwardforecasting.eu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Social Pulse subpath ───────────────────────────────────────────────────
    location /social-pulse/ {
        proxy_pass         http://127.0.0.1:8000/;   # trailing slash strips /social-pulse prefix
        proxy_http_version 1.1;

        # WebSocket support (for /ws/live)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600;
        proxy_send_timeout  3600;

        # Gzip responses
        gzip on;
        gzip_types application/json text/html text/css application/javascript;
    }

    # ── Your existing site (everything else) ──────────────────────────────────
    location / {
        # Replace with your existing site config
        root /var/www/forwardforecasting;
        try_files $uri $uri/ =404;
    }
}
