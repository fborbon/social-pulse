# Production docker-compose for forwardforecasting.eu
# Usage:
#   cp .env.example .env && nano .env   # fill in all API keys
#   docker compose -f deploy/docker-compose.prod.yml up -d
#   docker compose -f deploy/docker-compose.prod.yml logs -f api

version: "3.9"

x-common-env: &common-env
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://redis:6379
  BASE_URL: /social-pulse

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zk_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [CMD, pg_isready, -U, "${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  collector:
    build: ../collector
    restart: unless-stopped
    depends_on: [kafka, postgres]
    env_file: ../.env
    environment: *common-env
    ports:
      - "127.0.0.1:8001:8001"   # internal only

  filter-worker:
    build: ../workers/filter_worker
    restart: unless-stopped
    depends_on: [kafka]
    env_file: ../.env
    environment: *common-env

  enrichment-worker:
    build: ../workers/enrichment_worker
    restart: unless-stopped
    depends_on: [kafka, postgres]
    env_file: ../.env
    environment: *common-env

  ranking-worker:
    build: ../workers/ranking_worker
    restart: unless-stopped
    depends_on: [kafka]
    environment: *common-env

  summary-worker:
    build: ../workers/summary_worker
    restart: unless-stopped
    depends_on: [kafka, postgres]
    env_file: ../.env
    environment: *common-env

  api:
    build: ../api
    restart: unless-stopped
    depends_on: [kafka, postgres, redis]
    env_file: ../.env
    environment: *common-env
    ports:
      - "127.0.0.1:8000:8000"   # nginx proxies here

volumes:
  zk_data:
  kafka_data:
  postgres_data:
  redis_data:
